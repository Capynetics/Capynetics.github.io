<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="shortcut icon" type="image/png" href="{{ site.url }}/assets/favicon.ico">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <style>
    :root {
      --page-bg: #f7f4ed;
      --paper: #fffdf8;
      --text: #2d241c;
      --line: #ddd2c4;
      --accent: #7c3aed;
      --shadow: 0 24px 70px rgba(59, 42, 26, 0.08);
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      line-height: 1.7;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(186, 230, 253, 0.28), transparent 28%),
        linear-gradient(180deg, #fbf8f2 0%, var(--page-bg) 100%);
      display: flex;
      flex-direction: column;
    }

    .container {
      flex: 1;
      width: min(760px, calc(100% - 32px));
      margin: 96px auto 48px auto;
      padding: 32px;
      font-family: Georgia, 'Times New Roman', serif;
      background-color: var(--paper);
      border: 1px solid rgba(137, 119, 98, 0.14);
      box-shadow: var(--shadow);
    }

    .about-header {
      margin-bottom: 1.8rem;
      padding-bottom: 1.2rem;
      border-bottom: 1px solid var(--line);
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: #1e1914;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 6vw, 3.2rem);
      line-height: 1.08;
      letter-spacing: -0.02em;
    }

    .about-content {
      font-size: 1.08rem;
    }

    .about-content > :first-child {
      margin-top: 0;
    }

    .about-content p,
    .about-content ul,
    .about-content ol,
    .about-content blockquote,
    .about-content pre,
    .about-content figure {
      margin-top: 0;
      margin-bottom: 1.35rem;
    }

    .about-content ul,
    .about-content ol {
      padding-left: 1.4rem;
    }

    .about-content li + li {
      margin-top: 0.4rem;
    }

    .about-content a {
      color: var(--accent);
      text-decoration: none;
    }

    .about-content a:hover {
      text-decoration: underline;
    }

    .about-content img {
      max-width: 100%;
      height: auto;
      border-radius: 14px;
    }

    @media (max-width: 600px) {
      .container {
        margin-top: 72px;
        margin-bottom: 28px;
        padding: 22px 16px;
        width: calc(100% - 20px);
        box-sizing: border-box;
      }

      h1 {
        font-size: 2.1rem;
        word-wrap: break-word;
      }

      body, html {
        overflow-x: hidden;
      }
    }
  </style>
</head>
<body>

{% include new_navbar.html %}

<main class="container" aria-labelledby="about-title">
  <header class="about-header">
    <h1 id="about-title">{{ page.title }}</h1>
  </header>

  <article class="about-content">
    {{ content }}
  </article>
</main>

{% include new_footer.html %}

</body>
</html>
